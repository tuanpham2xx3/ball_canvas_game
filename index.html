<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balls Canvas Game — PixiJS</title>
  <meta name="description" content="Bouncing balls physics simulation built with PixiJS">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>⚽ Balls Physics</h1>
    <p class="subtitle">PixiJS • Elastic Collision • Gravity</p>
    <div id="game-container"></div>
    <div id="controls">
      <button id="btn-reset" title="Reset balls">🔄 Reset</button>
      <button id="btn-gravity" title="Toggle gravity">🌍 Gravity: ON</button>
      <button id="btn-add" title="Add a ball">➕ Add Ball</button>
    </div>
  </div>
  <script src="https://pixijs.download/v8.6.6/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
