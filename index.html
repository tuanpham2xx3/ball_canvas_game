<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balls Arena — PixiJS</title>
  <meta name="description" content="1v1 balls arena physics game with skills system">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>⚔️ Balls Arena</h1>
    <p class="subtitle">PixiJS • 1v1 • Physics Combat</p>
    <div id="game-container"></div>
    <div id="controls">
      <a class="link-btn" href="/builder.html" title="Build your balls">🧪 Builder</a>
      <button id="btn-start" title="Start match">▶ Start</button>
      <button id="btn-reset" title="New match">🔄 Reset</button>
      <button id="btn-gravity" title="Toggle gravity">🌍 Gravity: ON</button>
    </div>

    <div class="match-picker" aria-label="Spectator controls">
      <div class="picker">
        <label>Spectator</label>
        <div class="row">
          <button id="btn-pause" class="btn small">⏸ Pause</button>
          <select id="sel-speed" class="select small" title="Speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
            <option value="3">3×</option>
          </select>
        </div>
      </div>
      <div class="picker">
        <label>Tournament (Bo3)</label>
        <div class="row">
          <label class="toggle compact">
            <input id="chk-bo3" type="checkbox" />
            <span>Enable</span>
          </label>
          <button id="btn-series-reset" class="btn small">Reset</button>
        </div>
        <div id="series-score" class="meta">A 0 — 0 B</div>
      </div>
      <div class="picker">
        <label>Sound</label>
        <label class="toggle compact">
          <input id="chk-sfx" type="checkbox" checked />
          <span>SFX</span>
        </label>
      </div>
    </div>

    <div class="match-picker" aria-label="Match history">
      <div class="picker wide">
        <label>Match History</label>
        <div id="match-history" class="history"></div>
      </div>
    </div>
    <div id="match-picker" class="match-picker" aria-label="Match picker">
      <div class="picker">
        <label for="sel-a">Ball A</label>
        <select id="sel-a" class="select"></select>
      </div>
      <div class="picker">
        <label for="sel-b">Ball B</label>
        <select id="sel-b" class="select"></select>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
